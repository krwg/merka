<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эскиз платья — редактируемый</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Caveat:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4efe9;
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  h1 {
    font-weight: 300;
    font-size: 1.6rem;
    letter-spacing: 0.25em;
    color: #2e2420;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #8a7a70;
    letter-spacing: 0.12em;
    margin-bottom: 28px;
    font-style: italic;
    text-align: center;
  }

  /* ── Editor panel ── */
  .editor {
    background: #fdf9f5;
    border: 1px solid #d5ccc3;
    box-shadow: 3px 3px 0 #ddd5cc, 6px 6px 16px rgba(80,60,40,0.07);
    padding: 20px 22px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 28px;
  }

  .editor h2 {
    font-weight: 300;
    font-size: 1.05rem;
    letter-spacing: 0.15em;
    color: #2e2420;
    text-transform: uppercase;
    margin-bottom: 16px;
    text-align: center;
  }

  .inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 18px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8a7a70;
  }

  .field input {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: #2e2420;
    background: #fff;
    border: 1px solid #c5bbb0;
    border-radius: 4px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field input:focus {
    border-color: #8a7a70;
  }

  .field input::placeholder {
    color: #c5bbb0;
  }

  .editor-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 24px;
    background: transparent;
    border: 1px solid #2e2420;
    color: #2e2420;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
  }

  .btn:hover { background: #2e2420; color: #fdf9f5; }
  .btn.secondary { border-color: #8a7a70; color: #8a7a70; }
  .btn.secondary:hover { background: #8a7a70; color: #fdf9f5; }

  /* ── Variants ── */
  .variants {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
  }

  .variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .variant-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #8a7a70;
  }

  .sketch-card {
    background: #fdf9f5;
    border: 1px solid #d5ccc3;
    padding: 20px 16px 20px 28px;
    box-shadow: 3px 3px 0 #ddd5cc, 6px 6px 16px rgba(80,60,40,0.07);
    position: relative;
    width: fit-content;
  }

  svg { display: block; max-width: 100%; height: auto; }

  /* Measurement text styling */
  .meas-text {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    fill: #2e2420;
  }
  .meas-text.placeholder {
    fill: #a09080;
    font-size: 14px;
  }

  .btn-print {
    margin-top: 36px;
    padding: 11px 34px;
    background: transparent;
    border: 1px solid #2e2420;
    color: #2e2420;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-print:hover { background: #2e2420; color: #fdf9f5; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    h1 { font-size: 1.25rem; letter-spacing: 0.18em; }
    .subtitle { font-size: 0.78rem; }
    .editor { padding: 16px 14px; }
    .editor h2 { font-size: 0.95rem; }
    .inputs { grid-template-columns: 1fr; gap: 10px; }
    .field input { font-size: 1.15rem; padding: 5px 8px; }
    .sketch-card { padding: 14px 10px 14px 20px; }
    .variants { gap: 20px; }
    .btn, .btn-print { padding: 9px 20px; font-size: 0.8rem; }
  }

  @media print {
    body { background: white; padding: 0; }
    .editor, h1, .subtitle, .variant-label, .btn-print { display: none; }
    .variants { gap: 16px; }
    .sketch-card { box-shadow: none; border: 0.5px solid #bbb; padding: 20px 16px 20px 30px; }
  }
</style>
<base target="_blank">

<script>
  // Load saved values on page load
  (function() {
    const saved = localStorage.getItem('dressMeasurements');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        document.getElementById('chest').value = data.chest || '';
        document.getElementById('hip').value = data.hip || '';
        document.getElementById('sleeve').value = data.sleeve || '';
        document.getElementById('skirt').value = data.skirt || '';
        applyValues();
      } catch(e) {}
    }
  })();

  function applyValues() {
    const chest = document.getElementById('chest').value.trim();
    const hip = document.getElementById('hip').value.trim();
    const sleeve = document.getElementById('sleeve').value.trim();
    const skirt = document.getElementById('skirt').value.trim();

    // Variant 1 (filled values)
    document.getElementById('v1-chest').textContent = chest ? chest + ' см' : '33 см';
    document.getElementById('v1-hip').textContent = hip ? hip + ' см' : '49 см';
    document.getElementById('v1-sleeve').textContent = sleeve ? sleeve + ' см' : '49 см';
    document.getElementById('v1-skirt').textContent = skirt ? skirt + ' см' : '84 см';

    // Variant 2 (blank template — show value if entered, otherwise keep placeholder style)
    const v2Chest = document.getElementById('v2-chest');
    v2Chest.textContent = chest ? chest + ' см' : '___  см';
    v2Chest.classList.toggle('placeholder', !chest);

    const v2Hip = document.getElementById('v2-hip');
    v2Hip.textContent = hip ? hip + ' см' : '___  см';
    v2Hip.classList.toggle('placeholder', !hip);

    const v2Sleeve = document.getElementById('v2-sleeve');
    v2Sleeve.textContent = sleeve ? sleeve + ' см' : '___  см';
    v2Sleeve.classList.toggle('placeholder', !sleeve);

    const v2Skirt = document.getElementById('v2-skirt');
    v2Skirt.textContent = skirt ? skirt + ' см' : '___  см';
    v2Skirt.classList.toggle('placeholder', !skirt);

    // Save to localStorage
    localStorage.setItem('dressMeasurements', JSON.stringify({
      chest: chest,
      hip: hip,
      sleeve: sleeve,
      skirt: skirt
    }));
  }

  function clearValues() {
    document.getElementById('chest').value = '';
    document.getElementById('hip').value = '';
    document.getElementById('sleeve').value = '';
    document.getElementById('skirt').value = '';
    applyValues();
  }

  // Auto-apply on input (with small debounce for mobile)
  let debounceTimer;
  ['chest','hip','sleeve','skirt'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(applyValues, 300);
    });
  });

  // Also apply on Enter key
  document.querySelectorAll('.field input').forEach(input => {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        applyValues();
        this.blur();
      }
    });
  });
</script>

</body>
</html>
